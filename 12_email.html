<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Email — MBBET OS</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
#app { display:grid; grid-template-columns:56px 1fr; height:100vh; overflow:hidden; }
.sb {
  background: var(--card2, #08111a); border-right: 1px solid var(--br, rgba(255,255,255,.06));
  display:flex; flex-direction:column; align-items:center; overflow:hidden; z-index:30;
}
.sb-logo { width:56px; height:64px; display:flex; align-items:center; justify-content:center; border-bottom:1px solid var(--br2, rgba(255,255,255,.03)); flex-shrink:0; }
.sb-crown {
  width:36px; height:36px; border-radius:10px;
  background: linear-gradient(145deg,#2d1800,#b8890a,var(--gold));
  display:flex; align-items:center; justify-content:center; font-size:16px;
  box-shadow: 0 2px 8px rgba(247,204,70,.25), 0 0 20px rgba(247,204,70,.1), inset 0 1px 0 rgba(255,255,255,.15);
}
.sbl {
  width:56px; height:52px; display:flex; align-items:center; justify-content:center;
  font-size:18px; color:var(--t3); cursor:pointer; text-decoration:none;
  border-left:2px solid transparent; transition:.14s; position:relative;
}
.sbl:hover { color:var(--t1); background:rgba(255,255,255,.028); }
.sbl.act { color:var(--gold); background:rgba(247,204,70,.04); border-left-color:var(--gold); }
.sbl.act::before {
  content:''; position:absolute; left:0; top:6px; bottom:6px; width:2px;
  background:var(--gold); box-shadow:0 0 10px rgba(247,204,70,.6); border-radius:1px;
}
.sbl[title]:hover::after {
  content:attr(title); position:absolute; left:60px; top:50%; transform:translateY(-50%);
  background:rgba(10,14,32,.98); border:1px solid rgba(255,255,255,.08);
  padding:5px 11px; border-radius:8px; font-size:11px; font-weight:600; color:var(--t2);
  white-space:nowrap; z-index:100; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.sb-tog { margin-top:auto; width:56px; height:48px; display:flex; align-items:center; justify-content:center; color:var(--t3); cursor:pointer; font-size:14px; border-top:1px solid var(--br2, rgba(255,255,255,.03)); flex-shrink:0; }

/* ── LAYOUT EMAIL ── */
.mail-page { display:flex; flex-direction:column; height:100%; overflow:hidden; }

/* Scorecard colorata per cartella */
.mail-scorecard { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; padding:18px 22px 4px; flex-shrink:0; }
.mail-sc-card { position:relative; padding:15px 16px; border-radius:var(--r2); background:var(--s2); border:1px solid var(--b0); border-top:3px solid var(--fc,var(--gold)); cursor:pointer; transition:transform .12s,border-color .12s,box-shadow .12s; overflow:hidden; }
.mail-sc-card:hover { transform:translateY(-2px); }
.mail-sc-card.on { border-color:var(--fc,var(--gold)); box-shadow:0 0 0 1px var(--fc,var(--gold)), 0 8px 24px -8px var(--fc,var(--gold)); background:var(--s3); }
.mail-sc-icon { font-size:18px; margin-bottom:8px; }
.mail-sc-num { font-family:var(--mono); font-size:24px; font-weight:800; line-height:1; color:var(--fc,var(--gold)); }
.mail-sc-label { font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:.6px; font-weight:700; margin-top:5px; }

.mail-wrap { display:flex; flex:1; overflow:hidden; margin-top:16px; }
.mail-list-col { width:370px; flex-shrink:0; border-right:1px solid var(--b0); overflow-y:auto; border-top:1px solid var(--b0); }
.mail-list-hdr { display:flex; align-items:center; gap:8px; padding:12px 18px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--fc,var(--t2)); background:var(--s1); border-bottom:1px solid var(--b0); position:sticky; top:0; }
.mail-list-hdr-dot { width:7px; height:7px; border-radius:50%; background:var(--fc,var(--gold)); flex-shrink:0; }

.mail-item { display:flex; gap:12px; padding:14px 18px; border-bottom:1px solid var(--b0); border-left:3px solid transparent; cursor:pointer; transition:background .1s,border-color .1s; }
.mail-item:hover { background:var(--b0); }
.mail-item.on { background:var(--s3); border-left-color:var(--fc,var(--gold)); }
.mail-item-av { width:34px; height:34px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#04070c; background:var(--fc,var(--gold)); }
.mail-item-body { min-width:0; flex:1; }
.mail-item-client { font-size:13px; font-weight:800; color:var(--fc,var(--t1)); margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mail-item.unread .mail-item-subj { font-weight:700; color:var(--t1); }
.mail-item-subj { font-size:12px; font-weight:500; color:var(--t2); margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mail-item-from { font-size:11px; color:var(--t3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mail-item-date { font-size:9.5px; color:var(--t3); font-family:var(--mono); margin-top:4px; }
.mail-item-badge { flex-shrink:0; width:8px; height:8px; border-radius:50%; background:var(--fc,var(--gold)); margin-top:5px; box-shadow:0 0 8px var(--fc,var(--gold)); }

.mail-read-col { flex:1; overflow-y:auto; }
.mail-read-accent { height:5px; background:linear-gradient(90deg,var(--fc,var(--gold)),transparent); }
.mail-read-inner { padding:24px 28px; }
.mail-read-tag { display:inline-flex; align-items:center; gap:6px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--fc,var(--gold)); background:color-mix(in srgb, var(--fc,var(--gold)) 12%, transparent); border:1px solid color-mix(in srgb, var(--fc,var(--gold)) 30%, transparent); padding:3px 10px; border-radius:20px; margin-bottom:12px; }
.mail-read-client { font-size:14.5px; color:var(--t2); margin-bottom:8px; }
.mail-read-client b { color:var(--fc,var(--t1)); font-size:16px; }
.mail-read-subj { font-size:19px; font-weight:800; color:var(--t1); margin-bottom:10px; line-height:1.3; }
.mail-read-meta { font-size:11.5px; color:var(--t3); margin-bottom:18px; padding-bottom:16px; border-bottom:1px solid var(--b0); display:flex; align-items:center; gap:8px; }
.mail-read-meta b { color:var(--t2); font-weight:700; }
.mail-read-body { font-size:16px; color:var(--t1); line-height:1.75; white-space:pre-wrap; max-width:680px; }
.mail-read-iframe { width:100%; min-height:600px; border:none; background:#fff; border-radius:var(--r2); box-shadow:0 8px 32px -12px rgba(0,0,0,.5); }
.mail-read-zoom { display:flex; align-items:center; gap:6px; margin-bottom:14px; }
.mail-read-zoom button { width:28px; height:28px; border-radius:8px; border:1px solid var(--b1); background:var(--s2); color:var(--t2); font-size:14px; font-weight:800; cursor:pointer; }
.mail-read-zoom button:hover { background:var(--b1); color:var(--t1); }
.mail-read-zoom span { font-size:11px; color:var(--t3); font-family:var(--mono); min-width:38px; text-align:center; }
.mail-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; height:100%; color:var(--t3); font-size:12.5px; text-align:center; padding:24px; }
.mail-empty-ic { font-size:30px; opacity:.4; }

/* ══════════════════════════════════
   MOBILE RESPONSIVE — max 768px
══════════════════════════════════ */
@media(max-width:768px){
  #app{grid-template-columns:1fr;height:100dvh}
  .sb{
    position:fixed;bottom:0;left:0;right:0;top:auto;
    width:100%;height:56px;
    flex-direction:row;justify-content:space-around;align-items:center;
    border-right:none;border-top:1px solid var(--br,rgba(255,255,255,.06));
    z-index:200;overflow-x:auto;overflow-y:hidden}
  .sb-logo,.sb-tog{display:none}
  .sbl{width:auto;flex:1;max-width:48px;height:48px;border-left:none;border-bottom:2px solid transparent}
  .sbl.act{border-left:none;border-bottom-color:var(--gold)}
  .sbl.act::before{display:none}
  .sbl[title]:hover::after{display:none}

  #main{padding-bottom:56px;overflow-y:auto}
  .topbar{padding:0 14px}
  .topbar-title{font-size:12px}

  .mail-scorecard{grid-template-columns:repeat(auto-fit,minmax(90px,1fr));padding:12px 12px 4px}
  .mail-wrap{flex-direction:column;height:auto;margin-top:10px}
  .mail-list-col{width:100%;border-right:none;border-bottom:1px solid var(--b0);max-height:320px}
  .mail-read-inner{padding:16px}
  .mail-read-subj{font-size:16px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><h1>MBBET</h1><p>Operating System</p></div>
    <form onsubmit="handleLogin(event)">
      <input type="email" id="l-email" class="login-input" placeholder="Email" required autocomplete="email">
      <input type="password" id="l-pwd" class="login-input" placeholder="Password" required autocomplete="current-password">
      <button type="submit" class="login-btn" id="l-btn">Accedi</button>
    </form>
    <div id="login-err"></div>
  </div>
</div>

<div id="app" style="display:none">
  <nav class="sb">
    <div class="sb-logo"><div class="sb-crown">&#128081;</div></div>
    <a class="sbl" title="Mission Control" onclick="navTo('index.html')">&#127968;</a>
    <a class="sbl" title="CRM Clienti" onclick="navTo('01_clienti.html')">&#128100;</a>
    <a class="sbl" title="Bookmaker Intelligence" onclick="navTo('02_bonus.html')">&#127919;</a>
    <a class="sbl" title="Promo Center" onclick="navTo('02_bonus.html')">&#127881;</a>
    <a class="sbl" title="Task & Workflow">&#9989;</a>
    <a class="sbl" title="Team MBBET" onclick="navTo('03_team.html')">&#128101;</a>
    <a class="sbl" title="Revenue & Finanza" onclick="navTo('04_finanze.html')">&#128184;</a>
    <a class="sbl" title="Collaboratori" onclick="navTo('07_collab.html')">&#129309;</a>
    <a class="sbl" title="Documenti">&#128196;</a>
    <a class="sbl" title="Social MBBET" onclick="navTo('09_social.html')">&#128241;</a>
    <a class="sbl" title="Contratti" onclick="navTo('11_contratti.html')">&#128220;</a>
    <a class="sbl act" title="Email">&#128231;</a>
    <a class="sbl" title="Import Clienti" onclick="navTo('06_import.html')">&#128229;</a>
    <a class="sbl" title="Report">&#128202;</a>
    <div class="sb-tog">&#8942;</div>
  </nav>
  <div id="main">
    <div id="topbar"></div>
    <div id="page" style="padding:0;overflow:hidden">
      <div class="mail-page">
        <div class="mail-scorecard" id="mail-scorecard"></div>
        <div class="mail-wrap">
          <div class="mail-list-col" id="mail-list-col">
            <div class="mail-empty"><div class="mail-empty-ic">📬</div>Seleziona una cartella qui sopra</div>
          </div>
          <div class="mail-read-col" id="mail-read-col">
            <div class="mail-empty"><div class="mail-empty-ic">✉️</div>Seleziona un'email da leggere</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="shared/supabase.min.js"></script>
<script src="shared/auth.js"></script>
<script src="shared/layout.js"></script>
<script>
var CARTELLE = [
  { id:'BONUS',      label:'Bonus',       icon:'🎁', color:'var(--gold)' },
  { id:'VERIFICHE',  label:'Verifiche',   icon:'🪪', color:'var(--blue)' },
  { id:'SOSPENSIONI',label:'Sospensioni', icon:'⛔', color:'var(--red)' },
  { id:'DOCUMENTI',  label:'Documenti',   icon:'📄', color:'var(--purple)' },
  { id:'PRELIEVI',   label:'Prelievi',    icon:'💸', color:'var(--green)' }
];
var _mailFolderAtt = null;
var _mailCounts = {};
var _mailZoom = 100;

function regolaZoom(delta) {
  _mailZoom = Math.max(70, Math.min(160, _mailZoom + delta * 10));
  var frame = document.getElementById('mail-read-iframe');
  if (frame) frame.style.zoom = (_mailZoom / 100);
  var lbl = document.getElementById('mail-zoom-val');
  if (lbl) lbl.textContent = _mailZoom + '%';
}

function cartellaById(id) { return CARTELLE.find(function (c) { return c.id === id; }) || CARTELLE[0]; }
function formattaCliente(raw) {
  if (!raw || raw === '—' || raw === 'info') return 'Sconosciuto';
  return raw.charAt(0).toUpperCase() + raw.slice(1);
}

function onLoginSuccess() {
  if (!requireSection('email')) return;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'grid';
  document.getElementById('topbar').innerHTML = buildTopbar('Email', '');
  initNotifPanel();
  loadNotifCount();
  initRealtimeDot();
  renderScorecard();
  precaricaConteggi();
}

function renderScorecard() {
  var h = '';
  CARTELLE.forEach(function (c) {
    var n = _mailCounts[c.id];
    h += '<div class="mail-sc-card' + (c.id === _mailFolderAtt ? ' on' : '') + '" style="--fc:' + c.color + '" onclick="apriCartella(\'' + c.id + '\')">'
      + '<div class="mail-sc-icon">' + c.icon + '</div>'
      + '<div class="mail-sc-num">' + (n == null ? '—' : n) + '</div>'
      + '<div class="mail-sc-label">' + c.label + '</div>'
      + '</div>';
  });
  document.getElementById('mail-scorecard').innerHTML = h;
}

async function precaricaConteggi() {
  for (var i = 0; i < CARTELLE.length; i++) {
    var c = CARTELLE[i];
    try {
      var res = await fetch('/.netlify/functions/mail-list', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folder: c.id })
      });
      var data = await res.json();
      _mailCounts[c.id] = (data.messaggi || []).length;
    } catch (e) { _mailCounts[c.id] = 0; }
    renderScorecard();
  }
}

async function apriCartella(id) {
  _mailFolderAtt = id;
  renderScorecard();
  var c = cartellaById(id);
  var col = document.getElementById('mail-list-col');
  col.innerHTML = '<div class="mail-empty"><div class="spinner"></div></div>';
  document.getElementById('mail-read-col').innerHTML = '<div class="mail-empty"><div class="mail-empty-ic">✉️</div>Seleziona un\'email da leggere</div>';
  try {
    var res = await fetch('/.netlify/functions/mail-list', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ folder: id })
    });
    var data = await res.json();
    if (!res.ok) { col.innerHTML = '<div class="mail-empty">Errore: ' + escHtml(data.error || 'sconosciuto') + '</div>'; return; }
    _mailCounts[id] = data.messaggi.length;
    renderScorecard();
    var listHdr = '<div class="mail-list-hdr" style="--fc:' + c.color + '"><span class="mail-list-hdr-dot"></span>' + c.icon + ' ' + c.label + ' <span style="margin-left:auto;color:var(--t3);font-weight:600">' + data.messaggi.length + '</span></div>';
    if (!data.messaggi.length) { col.innerHTML = listHdr + '<div class="mail-empty"><div class="mail-empty-ic">📭</div>Nessuna email in questa cartella</div>'; return; }
    col.innerHTML = listHdr + data.messaggi.map(function (m) {
      var cliNm = formattaCliente(m.cliente);
      var iniziali = cliNm.trim().split(/\s+/).slice(0, 2).map(function (w) { return w[0] || ''; }).join('').toUpperCase() || '?';
      return '<div class="mail-item' + (m.letto ? '' : ' unread') + '" style="--fc:' + c.color + '" onclick="leggiEmail(\'' + id + '\',' + m.uid + ',this)">'
        + '<div class="mail-item-av" style="--fc:' + c.color + '">' + escHtml(iniziali) + '</div>'
        + '<div class="mail-item-body">'
        + '<div class="mail-item-client">👤 ' + escHtml(cliNm) + '</div>'
        + '<div class="mail-item-subj">' + escHtml(m.subject) + '</div>'
        + '<div class="mail-item-from">da ' + escHtml(m.from) + '</div>'
        + '<div class="mail-item-date">' + (m.date ? fdt(m.date) : '—') + '</div>'
        + '</div>'
        + (m.letto ? '' : '<div class="mail-item-badge" style="--fc:' + c.color + '"></div>')
        + '</div>';
    }).join('');
  } catch (e) {
    col.innerHTML = '<div class="mail-empty">Errore di connessione</div>';
  }
}

async function leggiEmail(folder, uid, el) {
  document.querySelectorAll('.mail-item').forEach(function (x) { x.classList.remove('on'); });
  if (el) el.classList.add('on');
  var c = cartellaById(folder);
  var pane = document.getElementById('mail-read-col');
  pane.innerHTML = '<div class="mail-empty"><div class="spinner"></div></div>';
  try {
    var res = await fetch('/.netlify/functions/mail-read', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ folder: folder, uid: uid })
    });
    var data = await res.json();
    if (!res.ok) { pane.innerHTML = '<div class="mail-empty">Errore: ' + escHtml(data.error || 'sconosciuto') + '</div>'; return; }
    var m = data.messaggio;
    var htmlIngrandito = m.html
      ? m.html.replace(/<head[^>]*>/i, '$&<style>body,td,p,span,div{font-size:17px!important;line-height:1.55!important}</style>')
      : null;
    if (htmlIngrandito && htmlIngrandito.indexOf('<style>body,td') < 0) {
      htmlIngrandito = '<style>body,td,p,span,div{font-size:17px!important;line-height:1.55!important}</style>' + htmlIngrandito;
    }
    var corpo = htmlIngrandito
      ? '<div class="mail-read-zoom"><button onclick="regolaZoom(-1)">−</button><span id="mail-zoom-val">100%</span><button onclick="regolaZoom(1)">+</button></div>'
        + '<iframe class="mail-read-iframe" id="mail-read-iframe" sandbox="" srcdoc="' + escHtml(htmlIngrandito).replace(/"/g, '&quot;') + '"></iframe>'
      : '<div class="mail-read-body">' + escHtml(m.text || '(nessun contenuto)') + '</div>';
    _mailZoom = 100;
    pane.innerHTML = '<div class="mail-read-accent" style="--fc:' + c.color + '"></div>'
      + '<div class="mail-read-inner">'
      + '<div class="mail-read-tag" style="--fc:' + c.color + '">' + c.icon + ' ' + c.label + '</div>'
      + '<div class="mail-read-client" style="--fc:' + c.color + '">👤 Cliente: <b>' + escHtml(formattaCliente(m.cliente)) + '</b></div>'
      + '<div class="mail-read-subj">' + escHtml(m.subject) + '</div>'
      + '<div class="mail-read-meta">Da <b>' + escHtml(m.from) + '</b> &middot; ' + (m.date ? fdt(m.date) : '—') + '</div>'
      + corpo
      + '</div>';
  } catch (e) {
    pane.innerHTML = '<div class="mail-empty">Errore di connessione</div>';
  }
}

function escHtml(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function fdt(d) { try { return new Date(d).toLocaleString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }); } catch (e) { return '—'; } }

async function handleLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('l-btn'), err = document.getElementById('login-err');
  btn.textContent = 'Accesso...'; btn.disabled = true; err.style.display = 'none';
  var res = await doLogin(document.getElementById('l-email').value.trim(), document.getElementById('l-pwd').value);
  if (res.error) { err.textContent = 'Email o password non validi.'; err.style.display = 'block'; btn.textContent = 'Accedi'; btn.disabled = false; return; }
  onLoginSuccess();
}

initAuth(onLoginSuccess, function onFail() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
});
</script>
</body>
</html>
