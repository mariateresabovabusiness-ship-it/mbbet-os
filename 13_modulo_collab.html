<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Segnala un Cliente — MBBET</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--gold:#dc2440;--green:#00f093;--red:#ff4f4f;--tx:#edf2ff;--tx2:#b8cee8;--tx3:#48627a;--br:rgba(255,255,255,.07)}
html,body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page{max-width:460px;margin:0 auto;padding:48px 20px 80px;animation:fadeUp .4s ease both}
.logo-wrap{text-align:center;margin-bottom:8px}
.logo-ic{width:100px;height:60px;border-radius:16px;background:linear-gradient(145deg,#2d0000,#8f0e14,var(--gold));display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px;box-shadow:0 8px 32px rgba(220,36,64,0.068)}
.logo-t{font-size:20px;font-weight:900;color:var(--gold);letter-spacing:2px}
.logo-s{font-size:11px;color:var(--tx3);margin-top:4px;letter-spacing:1px}
.for-collab{text-align:center;margin:18px 0 30px;padding:10px 16px;background:rgba(220,36,64,0.027);border:1px solid rgba(220,36,64,0.09);border-radius:12px;font-size:13px;color:var(--tx2)}
.for-collab b{color:var(--gold)}
.card{background:rgba(255,255,255,.02);border:1px solid var(--br);border-radius:18px;padding:26px 22px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:7px}
.field label .req{color:var(--red)}
.inp{width:100%;padding:13px 14px;background:rgba(255,255,255,.03);border:1px solid var(--br);border-radius:10px;color:var(--tx);font-size:14px;font-family:inherit;outline:none;transition:.15s}
.inp:focus{border-color:var(--gold);background:rgba(220,36,64,0.02)}
.field.err .inp{border-color:var(--red)}
.err-msg{display:none;font-size:11px;color:var(--red);margin-top:5px}
.field.err .err-msg{display:block}
.hint{font-size:10.5px;color:var(--tx3);margin-top:5px}
.btn-send{width:100%;padding:15px;background:linear-gradient(135deg,#3a0507,var(--gold));border:none;border-radius:12px;color:#000;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:.3px;margin-top:6px;transition:.15s}
.btn-send:disabled{opacity:.6;cursor:default}
.btn-send:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(220,36,64,0.09)}
#alert-box{display:none;margin-top:14px;padding:11px 14px;border-radius:10px;font-size:12.5px;background:rgba(255,79,79,.08);border:1px solid rgba(255,79,79,.25);color:#fff}
#success-page{display:none;text-align:center;animation:fadeUp .4s ease both}
.suc-ic{width:74px;height:74px;border-radius:50%;background:rgba(0,240,147,.1);border:1px solid rgba(0,240,147,.3);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px}
.suc-t{font-size:20px;font-weight:900;color:var(--tx);margin-bottom:10px}
.suc-s{font-size:13.5px;color:var(--tx3);line-height:1.7;max-width:340px;margin:0 auto}
</style>
</head>
<body>

<div class="page" id="form-page">
  <div class="logo-wrap">
    <div class="logo-ic"><img src="mbbet_logo_transparent.png" alt="MBBET" style="width:100%;height:100%;object-fit:contain"></div>
    <div class="logo-t">MBBET OS</div>
    <div class="logo-s">SEGNALA UN CLIENTE</div>
  </div>
  <div class="for-collab" id="for-collab" style="display:none">Stai segnalando un cliente per <b id="for-collab-nm"></b></div>

  <div class="card">
    <div class="field" id="f-nome">
      <label>Nome e Cognome <span class="req">*</span></label>
      <input class="inp" id="nome" type="text" placeholder="Mario Rossi" autocomplete="name">
      <div class="err-msg">Campo obbligatorio</div>
    </div>
    <div class="field" id="f-tel">
      <label>Numero di telefono <span class="req">*</span></label>
      <input class="inp" id="tel" type="tel" placeholder="+39 333 1234567" autocomplete="tel">
      <div class="err-msg">Inserisci un numero valido</div>
    </div>
    <div class="field">
      <label>Email</label>
      <input class="inp" id="email" type="email" placeholder="mario.rossi@gmail.com" autocomplete="email">
      <div class="hint">Facoltativa</div>
    </div>
    <button class="btn-send" id="submit-btn" onclick="submitForm()">Invia segnalazione</button>
    <div id="alert-box"></div>
  </div>
</div>

<div class="page" id="success-page">
  <div class="suc-ic">✓</div>
  <div class="suc-t">Cliente segnalato!</div>
  <div class="suc-s">Grazie, abbiamo registrato la segnalazione. Il cliente comparirà a breve nella lista.</div>
</div>

<script src="shared/supabase.min.js"></script>
<script>
var SUPA_URL='https://ntwqfuvcosvzpqrfpipn.supabase.co';
var SUPA_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50d3FmdXZjb3N2enBxcmZwaXBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTQzNzYsImV4cCI6MjA5ODQzMDM3Nn0.i_JkizD5xMQBNYi0W8T_1lY0jO8vPJPYUajWm-jjODg';
var _db=supabase.createClient(SUPA_URL,SUPA_ANON);
var COLLAB=(new URLSearchParams(location.search).get('collab')||'').trim();

if(COLLAB){
  document.getElementById('for-collab').style.display='block';
  document.getElementById('for-collab-nm').textContent=COLLAB;
}

function normalizePhone(t){
  if(!t)return null;
  t=t.replace(/\s/g,'').replace(/^0039/,'+39').replace(/^39([0-9]{9})/,'+39$1');
  if(t.length===10&&!t.startsWith('+'))t='+39'+t;
  return t;
}
function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function genClientId(){
  try{var r=await _db.rpc('rpc_next_client_id');if(r.data)return r.data;}catch(e){}
  return 'MBBET-'+String(Math.floor(Math.random()*90000+10000));
}

function showFieldErr(id,on){
  var f=document.getElementById('f-'+id);
  if(f)f.classList.toggle('err',!!on);
}

async function submitForm(){
  var nome=document.getElementById('nome').value.trim();
  var telRaw=document.getElementById('tel').value.trim();
  var tel=normalizePhone(telRaw);
  var email=document.getElementById('email').value.trim()||null;
  var alertBox=document.getElementById('alert-box');
  alertBox.style.display='none';

  var ok=true;
  showFieldErr('nome',!nome); if(!nome)ok=false;
  showFieldErr('tel',!telRaw||telRaw.replace(/\D/g,'').length<9); if(!telRaw||telRaw.replace(/\D/g,'').length<9)ok=false;
  if(!ok)return;

  var btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Invio...';

  try{
    var clientId=await genClientId();
    var payload={
      id:clientId,
      nome:nome,
      tel:tel,
      telefono:tel,
      email:email,
      tipologia:'Referral',
      collab:COLLAB||null,
      referral:COLLAB||null,
      stato:'LIBERO',
      data_ingresso:new Date().toISOString().slice(0,10),
      source:'modulo_collab'
    };
    var res=await _db.from('clienti').insert(payload);
    if(res.error)throw res.error;
    document.getElementById('form-page').style.display='none';
    document.getElementById('success-page').style.display='block';
  }catch(e){
    alertBox.textContent='Errore durante l\'invio: '+(e.message||'riprova tra poco.');
    alertBox.style.display='block';
    btn.disabled=false;btn.textContent='Invia segnalazione';
  }
}
</script>
</body>
</html>
