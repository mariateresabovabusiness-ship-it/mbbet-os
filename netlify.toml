[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"

[functions."notif-scadenze"]
  schedule = "@daily"

[functions."mail-notify"]
  schedule = "*/30 * * * *"

[functions."telegram-morning-digest"]
  schedule = "0 6 * * *"

# Pagine di test/legacy con query dirette al DB e senza controllo ruolo — bloccate dal publish pubblico.
# Reversibile: rimuovi questi blocchi per ripubblicarle.
[[redirects]]
  from = "/crm2.html"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/mini.html"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/test.html"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/04_finanze_backup.html"
  to = "/index.html"
  status = 404
  force = true
